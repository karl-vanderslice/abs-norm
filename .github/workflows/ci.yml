name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Install dependencies
        run: nix develop "path:." -c make install

      - name: Lint
        run: nix develop "path:." -c make lint

      - name: Test
        run: nix develop "path:." -c make test

      - name: Build app package
        run: nix build "path:.#abs-norm"

      - name: Build container image
        run: nix build "path:.#containerImage"

      - name: Upload container image artifact
        uses: actions/upload-artifact@v4
        with:
          name: abs-norm-container-image-${{ github.sha }}
          path: result
          if-no-files-found: error
